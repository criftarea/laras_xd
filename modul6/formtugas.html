<!DOCTYPE html>
<html>
    <head>
        <title>FORM</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <header style="text-align: center;">
        <img src="100c438dc404b926564f3e68ad24c23e.png"
        style="float: inherit ; width :200px ; height :200px ;"></header>
        <br>
        <h1 class="judul">FORM LOGIN</h1>
        <div class="kotak_login">
        <form>
             <label>NIS</label>
             <input type="number" name="NIS" class="form_login" placeholder="NIS">
             <br>
             <label>Name</label>
             <input type="text" name="Name" class="form_login" placeholder="Name">
             <br>
             <label>Place of birth</label>
             <input type="text" name="Place of birth" class="form_login" placeholder="Place of birth">
             <br>
             <label>Date of birth</label>
             <input type="date" name="Date of birth" class="form_login" placeholder="Date of birth">
             <br>
             <label>Religion</label>
             <br>
             <input type="radio" name="Religion" value=>Islam
             <input type="radio" name="Religion" value=>Kristen
             <input type="radio" name="Religion" value=>Khatolik
             <input type="radio" name="Religion" value=>Hindu
             <br>
             <input type="radio" name="Religion" value=>Buddha
             <input type="radio" name="Religion" value=>Konghucu
             <br>
             <br>
             <tr>
                <td>Gender</td>
                <br>
                <td>
                    <input type="checkbox" name="Gender" value=>Laki-laki
                    <input type="checkbox" name="Gender" value=>Perempuan
                </td>
             </tr>
             <br>
             <br>
             <label>Major</label><br>
             <select name="major">
                <option value="tja">Teknik Jaringan Akses Telekomunikasi</option>
                <option value="tkj">Teknik Komputer Dan Jaringan</option>
                <option value="rpl">Rekayasa Perangkat Lunak</option>
                <option value="dkv">Desain Komunikasi Visual</option>
                <option value="animasi">Animasi</option>
             <type class="form_login" placeholder="Major"></type></select>
             <br>
             <br>
             <label>Address</label>
             <input type="text" name="Address" class="form_login" placeholder="Address">
             <br>
             <input type="submit" class="tombol_login" value="SUBMIT">
        </form>
        </div>
        <footer style="text-align: center;"></footer>
    </body>
</html>
